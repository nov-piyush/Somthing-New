<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium Hand</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#start{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:14px 28px;
background:#000;
border:1px solid #fff;
color:#fff;
border-radius:30px;
font-size:16px;
}
</style>
</head>

<body>

<button id="start">START</button>
<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
const btn=document.getElementById("start");
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let w,h;
function resize(){
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
}
resize();
onresize=resize;

let hand=null,smooth=null;
let drawPoints=[];
let particles=[];
let wasPinch=false;

const HAND_CONNECTIONS=[
[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[5,9],[9,10],[10,11],[11,12],
[9,13],[13,14],[14,15],[15,16],
[13,17],[17,18],[18,19],[19,20],
[0,17]
];

function hue(){
return (performance.now()/10)%360;
}

const hands=new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(r=>{
hand=r.multiHandLandmarks?r.multiHandLandmarks[0]:null;
});

const camera=new Camera(video,{
onFrame: async()=>{await hands.send({image:video});},
width:640,height:480
});

btn.onclick=()=>{
btn.style.display="none";
document.documentElement.requestFullscreen().catch(()=>{});
camera.start();
};

function lerp(a,b,t){return a+(b-a)*t;}

function smoothHand(){
if(!hand)return;
if(!smooth){
smooth=JSON.parse(JSON.stringify(hand));
}else{
for(let i=0;i<21;i++){
smooth[i].x=lerp(smooth[i].x,hand[i].x,0.35);
smooth[i].y=lerp(smooth[i].y,hand[i].y,0.35);
}
}
}

function drawHand(p){
ctx.beginPath();
HAND_CONNECTIONS.forEach(([a,b])=>{
let p1=p[a],p2=p[b];
ctx.moveTo(w-p1.x*w,p1.y*h);
ctx.lineTo(w-p2.x*w,p2.y*h);
});
ctx.strokeStyle=`hsl(${hue()},100%,60%)`;
ctx.lineWidth=2;
ctx.shadowColor=`hsl(${hue()},100%,60%)`;
ctx.shadowBlur=10;
ctx.stroke();
}

function drawPointsGlow(p){
p.forEach((pt,i)=>{
let x=w-pt.x*w;
let y=pt.y*h;

ctx.beginPath();
ctx.arc(x,y,i===8?6:3,0,Math.PI*2);
ctx.fillStyle=`hsl(${hue()},100%,70%)`;
ctx.shadowColor=`hsl(${hue()},100%,70%)`;
ctx.shadowBlur=15;
ctx.fill();
});
}

function drawLine(){
if(drawPoints.length<2)return;

ctx.beginPath();
drawPoints.forEach((p,i)=>{
if(i===0) ctx.moveTo(p.x,p.y);
else ctx.lineTo(p.x,p.y);
});

ctx.strokeStyle=`hsl(${hue()},100%,60%)`;
ctx.lineWidth=4;
ctx.shadowColor=`hsl(${hue()},100%,60%)`;
ctx.shadowBlur=20;
ctx.stroke();
}

function pinch(p){
let t=p[4],i=p[8];
let dx=(t.x-i.x)*w;
let dy=(t.y-i.y)*h;
let d=Math.hypot(dx,dy);

let pin=d<35;

if(pin && !wasPinch){
for(let k=0;k<30;k++){
particles.push({
x:w-i.x*w,
y:i.y*h,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:1
});
}
}
wasPinch=pin;
}

function drawParticles(){
particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life-=0.03;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle=`hsl(${hue()},100%,60%)`;
ctx.globalAlpha=p.life;
ctx.fill();

if(p.life<=0) particles.splice(i,1);
});
ctx.globalAlpha=1;
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,w,h);

if(hand){
smoothHand();

let x=w-smooth[8].x*w;
let y=smooth[8].y*h;

drawPoints.push({x,y});
if(drawPoints.length>300) drawPoints.shift();

drawHand(smooth);
drawPointsGlow(smooth);
drawLine();
pinch(smooth);
}

drawParticles();

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
