<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
}
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}
#btn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
background:#000;
color:#fff;
border:1px solid #fff;
border-radius:25px;
}
</style>
</head>

<body>

<button id="btn">START</button>
<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const btn=document.getElementById("btn");

let w,h;
function resize(){
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
}
resize();
onresize=resize;

let hand=null;
let smooth=null;
let trail=[];
let particles=[];
let wasPinch=false;

function hue(){
return (Date.now()/10)%360;
}

// HAND
const hands=new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
});

hands.onResults(r=>{
hand=r.multiHandLandmarks?r.multiHandLandmarks[0]:null;
});

// CAMERA
const camera=new Camera(video,{
onFrame: async()=>{await hands.send({image:video});},
width:480,
height:360
});

btn.onclick=()=>{
btn.style.display="none";
document.documentElement.requestFullscreen().catch(()=>{});
camera.start();
};

// SMOOTH
function lerp(a,b,t){return a+(b-a)*t;}

function smoothHand(){
if(!hand)return;
if(!smooth){
smooth=JSON.parse(JSON.stringify(hand));
}else{
for(let i=0;i<21;i++){
smooth[i].x=lerp(smooth[i].x,hand[i].x,0.5);
smooth[i].y=lerp(smooth[i].y,hand[i].y,0.5);
}
}
}

// DRAW LINE
function drawTrail(){
if(trail.length<2)return;

ctx.beginPath();
trail.forEach((p,i)=>{
if(i==0) ctx.moveTo(p.x,p.y);
else ctx.lineTo(p.x,p.y);
});

let c=`hsl(${hue()},100%,60%)`;

ctx.strokeStyle=c;
ctx.lineWidth=4;
ctx.shadowColor=c;
ctx.shadowBlur=15;
ctx.stroke();
}

// PARTICLES
function pinch(p){
let t=p[4],i=p[8];
let dx=(t.x-i.x)*w;
let dy=(t.y-i.y)*h;
let d=Math.hypot(dx,dy);

let pin=d<30;

if(pin && !wasPinch){
for(let k=0;k<20;k++){
particles.push({
x:w-i.x*w,
y:i.y*h,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:1
});
}
}
wasPinch=pin;
}

function drawParticles(){
particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life-=0.04;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle=`hsl(${hue()},100%,60%)`;
ctx.globalAlpha=p.life;
ctx.fill();

if(p.life<=0) particles.splice(i,1);
});
ctx.globalAlpha=1;
}

// LOOP
function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,w,h);

if(hand){
smoothHand();

let x=w-smooth[8].x*w; // FIX MIRROR
let y=smooth[8].y*h;

trail.push({x,y});
if(trail.length>200) trail.shift();

drawTrail();
pinch(smooth);
}

drawParticles();

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
