<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Hand Interactive</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

<style>
body,html{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:sans-serif;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#ui{
position:fixed;
top:20px;
width:100%;
text-align:center;
color:#ff66aa;
letter-spacing:2px;
font-size:14px;
}

input{
margin-top:10px;
padding:8px 14px;
border:none;
border-radius:20px;
outline:none;
background:#111;
color:#fff;
text-align:center;
}
</style>
</head>

<body>

<div id="ui">
<div>DRAW • PINCH • CREATE MAGIC</div>
<input id="nameInput" placeholder="Enter Name">
</div>

<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let w=canvas.width=innerWidth;
let h=canvas.height=innerHeight;

window.onresize=()=>{
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
};

let hand=null, smooth=null;
let trail=[];
let shapes=[];
let particles=[];
let wasPinch=false;

const HAND_CONNECTIONS=[
[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[5,9],[9,10],[10,11],[11,12],
[9,13],[13,14],[14,15],[15,16],
[13,17],[17,18],[18,19],[19,20],
[0,17]
];

const hands=new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(res=>{
hand=res.multiHandLandmarks?res.multiHandLandmarks[0]:null;
if(!hand){ smooth=null; }
});

const camera=new Camera(video,{
onFrame: async()=>{ await hands.send({image:video}); },
width:640,height:480
});
camera.start();

function lerp(a,b,t){ return a+(b-a)*t; }

function smoothHand(){
if(!hand)return;
if(!smooth){
smooth=JSON.parse(JSON.stringify(hand));
}else{
for(let i=0;i<21;i++){
smooth[i].x=lerp(smooth[i].x,hand[i].x,0.4);
smooth[i].y=lerp(smooth[i].y,hand[i].y,0.4);
}
}
}

function drawHand(p){
ctx.lineWidth=2;
ctx.strokeStyle="#ff66aa";
ctx.shadowColor="#ff66aa";
ctx.shadowBlur=10;

ctx.beginPath();
HAND_CONNECTIONS.forEach(([a,b])=>{
ctx.moveTo(p[a].x*w,p[a].y*h);
ctx.lineTo(p[b].x*w,p[b].y*h);
});
ctx.stroke();

p.forEach((pt,i)=>{
ctx.beginPath();
ctx.arc(pt.x*w,pt.y*h,i==8?6:3,0,Math.PI*2);
ctx.fillStyle=i==8?"#fff":"#ff66aa";
ctx.fill();
});
}

function detectShape(){
if(trail.length<25) return;

let start=trail[0];
let end=trail[trail.length-1];
let d=Math.hypot(start.x-end.x,start.y-end.y);

if(d<50){
let type=Math.random();

if(type<0.33) shapes.push({type:"heart",x:end.x,y:end.y,life:1});
else if(type<0.66) shapes.push({type:"circle",x:end.x,y:end.y,life:1});
else shapes.push({type:"star",x:end.x,y:end.y,life:1});

trail=[];
}
}

function drawShapes(){
shapes.forEach((s,i)=>{
ctx.save();
ctx.translate(s.x,s.y);
ctx.globalAlpha=s.life;

ctx.shadowBlur=20;
ctx.shadowColor="#ff66aa";
ctx.fillStyle="#ff66aa";

if(s.type=="heart"){
ctx.beginPath();
ctx.moveTo(0,0);
ctx.bezierCurveTo(-10,-15,-25,10,0,25);
ctx.bezierCurveTo(25,10,10,-15,0,0);
ctx.fill();
}

if(s.type=="circle"){
ctx.beginPath();
ctx.arc(0,0,15,0,Math.PI*2);
ctx.fill();
}

if(s.type=="star"){
ctx.beginPath();
for(let i=0;i<5;i++){
let a=i*2*Math.PI/5;
ctx.lineTo(Math.cos(a)*15,Math.sin(a)*15);
}
ctx.closePath();
ctx.fill();
}

ctx.restore();

s.y-=0.4;
s.life-=0.02;

if(s.life<=0) shapes.splice(i,1);
});
}

function pinchEffect(p){
let t=p[4],i=p[8];
let dx=(t.x-i.x)*w;
let dy=(t.y-i.y)*h;
let dist=Math.hypot(dx,dy);

let pin=dist<40;

if(pin && !wasPinch){
for(let k=0;k<20;k++){
particles.push({
x:i.x*w,y:i.y*h,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:1
});
}
}
wasPinch=pin;
}

function drawParticles(){
particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life-=0.03;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fillStyle="rgba(255,100,150,"+p.life+")";
ctx.fill();

if(p.life<=0) particles.splice(i,1);
});
}

function drawName(){
let name=document.getElementById("nameInput").value;
if(!name) return;

ctx.font="40px sans-serif";
ctx.textAlign="center";
ctx.fillStyle="#ff66aa";
ctx.shadowColor="#ff66aa";
ctx.shadowBlur=20;

ctx.fillText(name,w/2,h*0.85);
}

function animate(){
ctx.clearRect(0,0,w,h);

if(hand){
smoothHand();
drawHand(smooth);

let x=smooth[8].x*w;
let y=smooth[8].y*h;

trail.push({x,y});
if(trail.length>30) trail.shift();

detectShape();
pinchEffect(smooth);
}

drawShapes();
drawParticles();
drawName();

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
