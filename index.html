<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracking Premium</title>

<!-- FIXED CDN (stable versions) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body,html{
width:100%;
height:100%;
overflow:hidden;
background:radial-gradient(circle,#1a1a2e,#000);
font-family:sans-serif;
}

#input_video{display:none;}

#output_canvas{
position:absolute;
width:100%;
height:100%;
transform:scaleX(-1);
}

#ui{
position:absolute;
top:40px;
width:100%;
text-align:center;
color:#00ffff;
}

#loader{
width:40px;height:40px;
border:3px solid rgba(0,255,255,0.1);
border-top:3px solid #00ffff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;margin-top:15px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<video id="input_video" autoplay playsinline></video>
<canvas id="output_canvas"></canvas>

<div id="ui">
<h2 id="text">INITIALIZING AI...</h2>
<div id="loader"></div>
</div>

<script>
const video = document.getElementById("input_video");
const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d");
const text = document.getElementById("text");
const loader = document.getElementById("loader");

canvas.width = innerWidth;
canvas.height = innerHeight;

let landmarksData = null;

const HAND_CONNECTIONS = [
[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[5,9],[9,10],[10,11],[11,12],
[9,13],[13,14],[14,15],[15,16],
[13,17],[17,18],[18,19],[19,20],
[0,17]
];

const hands = new Hands({
locateFile: (file) => {
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(res=>{
loader.style.display="none";
text.innerText="MOVE YOUR HAND";

if(res.multiHandLandmarks){
landmarksData = res.multiHandLandmarks[0];
}else{
landmarksData = null;
}
});

const camera = new Camera(video,{
onFrame: async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start().catch(()=>{
text.innerText="CAMERA ERROR";
loader.style.display="none";
});

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(landmarksData){

// draw lines
ctx.beginPath();
HAND_CONNECTIONS.forEach(([a,b])=>{
let p1 = landmarksData[a];
let p2 = landmarksData[b];

ctx.moveTo(p1.x*canvas.width,p1.y*canvas.height);
ctx.lineTo(p2.x*canvas.width,p2.y*canvas.height);
});
ctx.strokeStyle="#00ffff";
ctx.lineWidth=2;
ctx.shadowColor="#00ffff";
ctx.shadowBlur=10;
ctx.stroke();

// draw points
landmarksData.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x*canvas.width,p.y*canvas.height,4,0,Math.PI*2);
ctx.fillStyle="#ffffff";
ctx.fill();
});

}

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
